<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Лучший репетитор игры на гитаре в Иванове"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Портфолио гитариста</title>
  </head>
  <body>
    <!-- Главная секция -->
    <section class="main-section">
      <div class="container main-section__nav-container">
        <header class="main-section__header">
          <img
            src="./icons/logo.svg"
            alt="Логотип школы"
            class="main-section__logo"
          />
        </header>
        <nav class="main-section__nav nav-menu">
          <ul class="nav-menu__list">
            <li class="nav-menu__list-item"><a href="#">Обо мне</a></li>
            <li class="nav-menu__list-item"><a href="#">Занятия</a></li>
            <li class="nav-menu__list-item"><a href="#">Запись</a></li>
          </ul>
        </nav>
      </div>
      <div class="container main-section__content-container">
        <!-- Левая часть. Изображение и декоративные лепестки -->
        <div class="left-wrapper">
          <div class="left-wrapper__rectangle-blue"></div>
          <div class="left-wrapper__rectangle-grey"></div>
          <div class="left-wrapper__rectangle-orange"></div>
          <img
            src="./img/guitarist.png"
            alt="Изображение гитариста"
            class="left-wrapper__img"
          />
        </div>
        <!-- Правая часть. Иконки соцсетей. Заголовок. Кнопка. -->
        <div class="main-section__first-ring ring"></div>
        <div class="right-wrapper">
          <div class="right-wrapper__icon-box icons">
            <div class="icons__item"><i class="bi bi-microsoft-teams"></i></div>
            <div class="icons__item"><i class="bi bi-wechat"></i></div>
            <div class="icons__item"><i class="bi bi-telegram"></i></div>
            <div class="icons__item"><i class="bi bi-google"></i></div>
          </div>
          <h1 class="right-wrapper__title title">Я Виктор</h1>
          <p class="right-wrapper__text">
            Репетитор игры на гитаре с семилетним опытом преподавания
          </p>
          <div class="right-wrapper__button buttons">
            <button class="buttons__main-btn">Забронировать <br />урок</button>
            <div class="right-wrapper__icon-btn buttons__icon-btn">
              <img src="icons/chat.svg" alt="Иконка чата" />
              <p class="buttons__text">Есть <br />вопросы?</p>
            </div>
          </div>
        </div>
      </div>
      <div class="main-section__second-ring ring ring_big"></div>
    </section>
    <section class="section-courses">
      <div class="section-courses__container container">
        <h2 class="section-courses__title title">Преподаю</h2>
        <div class="section-courses__cards-box">
          <div class="section-courses__cards-item cards-item cards-item_grey">
            <img
              src="./img/Pragmatic.png"
              alt="Фотография электрогитары"
              class="cards-item__img"
            />
            <p class="cards-item__text">Электро<br>гитара</p>
          </div>
          <div class="section-courses__cards-item cards-item cards-item_orange">
            <img
              src="./img/acustic.png"
              alt="Фотография акустической гитары"
              class="cards-item__img"
            />
            <p class="cards-item__text">Акустическая<br>гитара</p>
          </div>
          <div class="section-courses__cards-item cards-item cards-item_blue">
            <img
              src="./img/ukulele.png"
              alt="Фотография гитары укулеле"
              class="cards-item__img"
            />
            <p class="cards-item__text">Укулеле<br>гитара</p>
          </div>
        </div>
        <div class="section-courses__icons-box">
          <div class="section-courses__icons-item icons-item">
            <img src="./icons/kubok.svg" alt="Кубок" class="icons-item__img">
            <p class="icons-item__text"><span>7</span><br> лет <br> преподавания</p>
          </div>
          <div class="section-courses__icons-item icons-item">
            <img src="./icons/amark.svg" alt="Буква А+" class="icons-item__img">
            <p class="icons-item__text"><span>276</span><br> отзывов <br> на 5 звезд</p>
          </div>
          <div class="section-courses__icons-item icons-item">
            <img src="./icons/bachelor.svg" alt="Академическая шапка" class="icons-item__img">
            <p class="icons-item__text"><span>314</span><br> студентов <br> обучено</p>
          </div>
          <div class="section-courses__icons-item icons-item">
            <img src="./icons/note.svg" alt="Скрипичный ключ" class="icons-item__img">
            <p class="icons-item__text"><span>2000</span><br> часов <br> преподавания</p>
          </div>
        </div>
        <div class="section-courses__first-ring ring ring_white"></div>
        <div class="section-courses__second-ring ring ring_white"></div>
      </div>
    </section>
    <section class="section-learning"></section>
    <footer class="footer"></footer>
  </body>
</html>
